<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Google & Isco 🎉</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff4e50, #fc913a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slider-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            gap: 20px;
        }

        .main-slide {
            flex: 3;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .main-slide img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .slide-text {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 100%;
            padding: 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s ease;
        }

        .slide-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        .thumbnails {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .thumbnail {
            cursor: pointer;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
            opacity: 0.6;
        }

        .thumbnail img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        .thumbnail.active {
            transform: scale(1.05);
            opacity: 1;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .fade {
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.05);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Bouton musique */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 999;
        }

        @media(max-width:768px) {
            .slider-container {
                flex-direction: column;
            }

            .thumbnails {
                flex-direction: row;
                justify-content: center;
            }

            .thumbnail img {
                height: 80px;
            }

            .main-slide img {
                height: 350px;
            }
        }
    </style>
</head>

<body>

    <button id="musicBtn" class="music-btn">🔊 Musique</button>

<div class="slider-container">

    <div class="main-slide">
        <img id="mainImage" src="image1.jpg">
        <div class="slide-text show" id="mainText">
            Joyeux anniversaire Google & Isco ❤️ Vous êtes des jumeaux extraordinaires !
        </div>
    </div>

    <div class="thumbnails">
        <div class="thumbnail active" data-img="image1.jpg"
            data-text="Joyeux anniversaire Google & Isco ❤️ Vous êtes des jumeaux extraordinaires !">
            <img src="image1.jpg">
        </div>

        <div class="thumbnail" data-img="image2.jpg"
            data-text="Deux cœurs, une seule âme 💫 Que votre complicité dure toujours !">
            <img src="image2.jpg">
        </div>

        <div class="thumbnail" data-img="tt.jpg"
            data-text="Que cette nouvelle année soit remplie de bonheur et de sourires 🎂✨">
            <img src="tt.jpg">
        </div>

        <div class="thumbnail" data-img="yy.jpg" data-text="Continuez à rêver grand et à viser les étoiles ✨🌟">
            <img src="yy.jpg">
        </div>

        <div class="thumbnail" data-img="image3.jpg" data-text="Restez toujours unis et partagez chaque moment 💖">
            <img src="image3.jpg">
        </div>

        <div class="thumbnail" data-img="image4.jpg" data-text="Soyez toujours forts malgré les hauts et les bas 💪">
            <img src="image6.jpg">
        </div>
    </div>

</div>
    <audio id="bgMusic">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const thumbnails = document.querySelectorAll(".thumbnail");
        const mainImage = document.getElementById("mainImage");
        const mainText = document.getElementById("mainText");
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");

        let currentIndex = 0;
        let autoSlideInterval;

        // 🎵 CONFIG MUSIQUE
        const startTime = 17; // 0:17
        const endTime = 56;   // 0:56

        // Essayer autoplay au chargement
        window.addEventListener("load", () => {
            music.currentTime = startTime;
            const playPromise = music.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    console.log("Autoplay bloqué. Utilisez le bouton 🔊");
                });
            }
        });

        // Boucle entre 17s et 56s
        music.addEventListener("timeupdate", () => {
            if (music.currentTime >= endTime) {
                music.currentTime = startTime;
                music.play();
            }
        });

        // Bouton musique
        musicBtn.addEventListener("click", () => {
            if (music.paused) {
                music.currentTime = startTime;
                music.play();
                musicBtn.textContent = "🔇 Stop";
            } else {
                music.pause();
                musicBtn.textContent = "🔊 Musique";
            }
        });

        // Slider fonction
        function changeSlide(index) {
            thumbnails.forEach(t => t.classList.remove("active"));
            thumbnails[index].classList.add("active");

            mainImage.classList.remove("fade");
            void mainImage.offsetWidth;
            mainImage.classList.add("fade");

            mainText.classList.remove("show");
            void mainText.offsetWidth;

            mainImage.src = thumbnails[index].dataset.img;
            mainText.textContent = thumbnails[index].dataset.text;

            setTimeout(() => {
                mainText.classList.add("show");
            }, 200);

            currentIndex = index;
        }

        // Auto slide
        function startAutoSlide() {
            autoSlideInterval = setInterval(() => {
                let nextIndex = (currentIndex + 1) % thumbnails.length;
                changeSlide(nextIndex);
            }, 5000);
        }

        thumbnails.forEach((thumbnail, index) => {
            thumbnail.addEventListener("click", () => {
                changeSlide(index);
                clearInterval(autoSlideInterval);
                startAutoSlide();
            });
        });

        startAutoSlide();
    </script>

</body>

</html>
